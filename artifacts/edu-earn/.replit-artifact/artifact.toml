kind = "web"
previewPath = "/"
title = "EduEarn - Student Productivity & Earning"
version = "1.0.0"
id = "artifacts/edu-earn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21998

[services.development]
run = "pnpm --filter @workspace/edu-earn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edu-earn", "run", "build" ]
publicDir = "artifacts/edu-earn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21998"
BASE_PATH = "/"
