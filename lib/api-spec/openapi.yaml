openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: EduEarn Student Productivity & Earning API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: tasks
  - name: users
  - name: leaderboard
  - name: notifications
  - name: challenges
  - name: dashboard
  - name: tutors
  - name: internships
  - name: streams
  - name: study

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Get all tasks
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [study, gig, challenge]
        - name: completed
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Mark a task as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCompletionResult"
        "400":
          description: Task already completed or error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get user profile with stats
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/completed-tasks:
    get:
      operationId: getCompletedTasks
      tags: [users]
      summary: Get user completed tasks history
      responses:
        "200":
          description: Completed tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompletedTask"

  /users/checkin:
    post:
      operationId: dailyCheckin
      tags: [users]
      summary: Daily check-in to update streak
      responses:
        "200":
          description: Check-in result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinResult"

  /users/join-stream:
    post:
      operationId: joinStream
      tags: [users]
      summary: Join a class stream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinStreamRequest"
      responses:
        "200":
          description: Joined stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [weekly, alltime]
            default: weekly
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  /leaderboard/stream:
    get:
      operationId: getStreamLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard for current user's stream
      responses:
        "200":
          description: Stream leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamLeaderboardResponse"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get user notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /challenges/today:
    get:
      operationId: getTodayChallenge
      tags: [challenges]
      summary: Get today's daily challenge
      responses:
        "200":
          description: Today's challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyChallenge"

  /challenges/{id}/complete:
    post:
      operationId: completeChallenge
      tags: [challenges]
      summary: Complete today's daily challenge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Challenge completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCompletionResult"
        "400":
          description: Already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /tutors:
    get:
      operationId: getTutors
      tags: [tutors]
      summary: Get tutor/coaching listings
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: subject
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tutors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TutorListing"
    post:
      operationId: createTutorListing
      tags: [tutors]
      summary: Create a tutor listing (teacher role only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTutorListingRequest"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TutorListing"
        "403":
          description: Teacher role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tutors/{id}:
    delete:
      operationId: deleteTutorListing
      tags: [tutors]
      summary: Delete own tutor listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tutors/my-listings:
    get:
      operationId: getMyTutorListings
      tags: [tutors]
      summary: Get own tutor listings (teacher)
      responses:
        "200":
          description: My tutor listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TutorListing"

  /internships:
    get:
      operationId: getInternships
      tags: [internships]
      summary: Get internship/job listings
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [internship, part_time, freelance]
        - name: location
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of internships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InternshipListing"
    post:
      operationId: createInternshipListing
      tags: [internships]
      summary: Create internship listing (employer role)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInternshipListingRequest"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternshipListing"
        "403":
          description: Employer role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /internships/{id}:
    delete:
      operationId: deleteInternshipListing
      tags: [internships]
      summary: Delete own internship listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /internships/my-listings:
    get:
      operationId: getMyInternshipListings
      tags: [internships]
      summary: Get own internship listings (employer)
      responses:
        "200":
          description: My listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InternshipListing"

  /streams:
    get:
      operationId: getStreams
      tags: [streams]
      summary: Get all available streams and their member counts
      responses:
        "200":
          description: Streams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StreamInfo"

  /streams/{stream}/members:
    get:
      operationId: getStreamMembers
      tags: [streams]
      summary: Get members of a specific stream
      parameters:
        - name: stream
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stream members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StreamMember"

  /study/sessions:
    post:
      operationId: logStudySession
      tags: [study]
      summary: Log a completed study session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogStudySessionRequest"
      responses:
        "201":
          description: Session logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudySessionResult"

  /study/today:
    get:
      operationId: getTodayStudyStats
      tags: [study]
      summary: Get today's study stats
      responses:
        "200":
          description: Today's study stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayStudyStats"

  /study/history:
    get:
      operationId: getStudyHistory
      tags: [study]
      summary: Get past 7 days study history
      responses:
        "200":
          description: Study history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudyDaySummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [student, teacher, employer]
          default: student
      required: [name, email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [student, teacher, employer]
        points:
          type: integer
        streak:
          type: integer
        stream:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        lastCheckin:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, points, streak, createdAt]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user]

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [study, gig, challenge]
        reward:
          type: integer
        points:
          type: integer
        completed:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, title, category, reward, points, completed, createdAt]

    TaskCompletionResult:
      type: object
      properties:
        task:
          $ref: "#/components/schemas/Task"
        pointsEarned:
          type: integer
        rewardEarned:
          type: integer
        newTotalPoints:
          type: integer
        message:
          type: string
      required: [task, pointsEarned, rewardEarned, newTotalPoints, message]

    CompletedTask:
      type: object
      properties:
        id:
          type: integer
        taskId:
          type: integer
        taskTitle:
          type: string
        category:
          type: string
        reward:
          type: integer
        points:
          type: integer
        completedAt:
          type: string
          format: date-time
      required: [id, taskId, taskTitle, category, reward, points, completedAt]

    UserProfile:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        totalTasksCompleted:
          type: integer
        totalRewardsEarned:
          type: integer
        rank:
          type: integer
        weeklyPoints:
          type: integer
        totalStudyMinutesToday:
          type: integer
      required: [user, totalTasksCompleted, totalRewardsEarned, rank, weeklyPoints, totalStudyMinutesToday]

    CheckinResult:
      type: object
      properties:
        streak:
          type: integer
        message:
          type: string
        isNewDay:
          type: boolean
      required: [streak, message, isNewDay]

    JoinStreamRequest:
      type: object
      properties:
        stream:
          type: string
      required: [stream]

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: integer
        name:
          type: string
        points:
          type: integer
        streak:
          type: integer
        tasksCompleted:
          type: integer
        isCurrentUser:
          type: boolean
      required: [rank, userId, name, points, streak, tasksCompleted, isCurrentUser]

    LeaderboardResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        currentUserRank:
          type: integer
          nullable: true
        period:
          type: string
      required: [entries, period]

    StreamLeaderboardResponse:
      type: object
      properties:
        stream:
          type: string
          nullable: true
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        currentUserRank:
          type: integer
          nullable: true
      required: [entries]

    Notification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [task_available, reward_earned, streak_milestone, challenge_available, rank_change]
        title:
          type: string
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, type, title, message, read, createdAt]

    DailyChallenge:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        reward:
          type: integer
        bonusReward:
          type: integer
        points:
          type: integer
        bonusPoints:
          type: integer
        completed:
          type: boolean
        date:
          type: string
      required: [id, title, reward, bonusReward, points, bonusPoints, completed, date]

    DashboardSummary:
      type: object
      properties:
        totalPoints:
          type: integer
        currentStreak:
          type: integer
        tasksCompletedToday:
          type: integer
        pendingTasks:
          type: integer
        totalRewardsEarned:
          type: integer
        weeklyRank:
          type: integer
          nullable: true
        challengeCompleted:
          type: boolean
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/CompletedTask"
        studyMinutesToday:
          type: integer
        streamName:
          type: string
          nullable: true
      required: [totalPoints, currentStreak, tasksCompletedToday, pendingTasks, totalRewardsEarned, challengeCompleted, recentActivity, studyMinutesToday]

    TutorListing:
      type: object
      properties:
        id:
          type: integer
        teacherId:
          type: integer
        teacherName:
          type: string
        subject:
          type: string
        description:
          type: string
          nullable: true
        fees:
          type: integer
        feesLabel:
          type: string
        city:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
          nullable: true
        mode:
          type: string
          enum: [online, offline, both]
        createdAt:
          type: string
          format: date-time
      required: [id, teacherId, teacherName, subject, fees, feesLabel, city, contactEmail, mode, createdAt]

    CreateTutorListingRequest:
      type: object
      properties:
        subject:
          type: string
        description:
          type: string
        fees:
          type: integer
        feesLabel:
          type: string
        city:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        mode:
          type: string
          enum: [online, offline, both]
      required: [subject, fees, feesLabel, city, contactEmail, mode]

    InternshipListing:
      type: object
      properties:
        id:
          type: integer
        employerId:
          type: integer
        employerName:
          type: string
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [internship, part_time, freelance]
        payment:
          type: integer
        paymentLabel:
          type: string
        location:
          type: string
        applyLink:
          type: string
          nullable: true
        applyEmail:
          type: string
          nullable: true
        skills:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, employerId, employerName, title, description, type, payment, paymentLabel, location, createdAt]

    CreateInternshipListingRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [internship, part_time, freelance]
        payment:
          type: integer
        paymentLabel:
          type: string
        location:
          type: string
        applyLink:
          type: string
        applyEmail:
          type: string
        skills:
          type: string
      required: [title, description, type, payment, paymentLabel, location]

    StreamInfo:
      type: object
      properties:
        stream:
          type: string
        memberCount:
          type: integer
        isJoined:
          type: boolean
      required: [stream, memberCount, isJoined]

    StreamMember:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        points:
          type: integer
        streak:
          type: integer
        tasksCompleted:
          type: integer
        isCurrentUser:
          type: boolean
      required: [userId, name, points, streak, tasksCompleted, isCurrentUser]

    LogStudySessionRequest:
      type: object
      properties:
        durationSeconds:
          type: integer
        date:
          type: string
          format: date
      required: [durationSeconds]

    StudySessionResult:
      type: object
      properties:
        sessionMinutes:
          type: integer
        totalMinutesToday:
          type: integer
        goalMinutes:
          type: integer
        message:
          type: string
        goalReached:
          type: boolean
      required: [sessionMinutes, totalMinutesToday, goalMinutes, message, goalReached]

    TodayStudyStats:
      type: object
      properties:
        totalSeconds:
          type: integer
        totalMinutes:
          type: integer
        goalMinutes:
          type: integer
        goalReached:
          type: boolean
        sessionsCount:
          type: integer
      required: [totalSeconds, totalMinutes, goalMinutes, goalReached, sessionsCount]

    StudyDaySummary:
      type: object
      properties:
        date:
          type: string
        totalMinutes:
          type: integer
        sessionsCount:
          type: integer
      required: [date, totalMinutes, sessionsCount]
